appname = casdoor
httpport = 8000
runmode = dev
SessionOn = true
copyrequestbody = true

; Database configuration
driverName = sqlite3
dataSourceName = file:casdoor.db?cache=shared&_busy_timeout=10000
dbName = casdoor

; Redis configuration (optional)
; redisEndpoint =

; Static files
staticdir = ./web/build

; HTTPS configuration
; httpport = 443
; EnableHTTPS = true
; HTTPSCertFile = conf/server.crt
; HTTPSKeyFile = conf/server.key

; Token JWT secret
tokenJwtSecret = 

; LDAP configuration
ldapServerPort = 389

; Session configuration
; Default session lifetime is 3600 seconds (1 hour). Increase for longer login sessions.
; 86400 = 1 day, 604800 = 7 days, 2592000 = 30 days
; Using 2592000 (30 days) for local dev to avoid frequent re-logins during extended testing periods
sessionlifetime = 2592000

; Log configuration
; Set log level: LevelEmergency=0, LevelAlert=1, LevelCritical=2, LevelError=3,
; LevelWarning=4, LevelNotice=5, LevelInformational=6, LevelDebug=7
; Using LevelInformational (6) in dev for more verbose output during local debugging
loglevel = 6
